services:
  # MinIO - Object Storage
  minio:
    image: minio/minio:latest
    container_name: lakehouse-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # MinIO Client - Bucket yaratmaq üçün
  minio-setup:
    image: minio/mc:latest
    container_name: lakehouse-minio-setup
    depends_on:
      - minio
    networks:
      - lakehouse
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin123;
      /usr/bin/mc mb myminio/warehouse --ignore-existing;
      /usr/bin/mc mb myminio/raw-data --ignore-existing;
      /usr/bin/mc anonymous set download myminio/warehouse;
      /usr/bin/mc anonymous set download myminio/raw-data;
      exit 0;
      "

  # Nessie - Catalog Server
  nessie:
    image: projectnessie/nessie:latest
    container_name: lakehouse-nessie
    ports:
      - "19120:19120"
    environment:
      QUARKUS_HTTP_PORT: 19120
      NESSIE_VERSION_STORE_TYPE: ROCKSDB
      QUARKUS_PROFILE: prod
    volumes:
      - nessie-data:/nessie/data
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:19120/api/v1/config || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  
  # PostgreSQL for Airflow & Source Data
  postgres:
    image: postgres:13
    container_name: lakehouse-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spark Master
  spark-master:
    image: apache/spark:3.5.0-scala2.12-java11-python3-ubuntu
    container_name: lakehouse-spark-master
    hostname: spark-master
    ports:
      - "8088:8088"
      - "7077:7077"
      - "4040:4040"
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
    volumes:
      - ./spark/apps:/opt/spark-apps
      - ./spark/data:/opt/spark-data
      - ./spark/jars:/opt/spark/jars-extra
    networks:
      - lakehouse
    command: >
      bash -c "
      mkdir -p /opt/spark/jars-extra &&
      curl -o /opt/spark/jars-extra/postgresql-42.7.1.jar https://jdbc.postgresql.org/download/postgresql-42.7.1.jar &&
      curl -o /opt/spark/jars-extra/hadoop-aws-3.3.4.jar https://repo1.maven.org/maven2/org/apache/hadoop/hadoop-aws/3.3.4/hadoop-aws-3.3.4.jar &&
      curl -o /opt/spark/jars-extra/aws-java-sdk-bundle-1.12.262.jar https://repo1.maven.org/maven2/com/amazonaws/aws-java-sdk-bundle/1.12.262/aws-java-sdk-bundle-1.12.262.jar &&
      curl -o /opt/spark/jars-extra/iceberg-spark-runtime-3.5_2.12-1.4.2.jar https://repo1.maven.org/maven2/org/apache/iceberg/iceberg-spark-runtime-3.5_2.12/1.4.2/iceberg-spark-runtime-3.5_2.12-1.4.2.jar &&
      curl -o /opt/spark/jars-extra/nessie-spark-extensions-3.5_2.12-0.74.0.jar https://repo1.maven.org/maven2/org/projectnessie/nessie-spark-extensions-3.5_2.12/0.74.0/nessie-spark-extensions-3.5_2.12-0.74.0.jar &&
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      "

  # Spark Worker 1
  spark-worker-1:
    image: apache/spark:3.5.0-scala2.12-java11-python3-ubuntu
    container_name: lakehouse-spark-worker-1
    hostname: spark-worker-1
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=1
      - SPARK_WORKER_MEMORY=1G
      - SPARK_WORKER_WEBUI_PORT=8081
    volumes:
      - ./spark/apps:/opt/spark-apps
      - ./spark/data:/opt/spark-data
      - ./spark/jars:/opt/spark/jars-extra
    networks:
      - lakehouse
    command: >
      bash -c "
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
      "

  # Trino - Query Engine
  trino:
    image: trinodb/trino:latest
    container_name: trino
    volumes:
      - ./trino/catalog:/etc/trino/catalog
    ports:
      - "8080:8080"
    networks:
      - lakehouse  # <--- BU HİSSƏ MÜTLƏQDİR
    depends_on:
      - nessie
      - minio
      
# Merged Airflow Container
  airflow:
    build: .
    image: apache/airflow:2.7.3-python3.11
    container_name: lakehouse-airflow
    depends_on:
      - postgres
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__FERNET_KEY=UKMzEm3yIuFYEq1y3-2FxPNWSVwRASpahmQ9kQfEr8E=
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=true
      - AIRFLOW__CORE__TEST_CONNECTION=Enabled
      - AIRFLOW__WEBSERVER__WEB_SERVER_PORT=8085
      - AIRFLOW_WWW_USER_USERNAME=admin
      - AIRFLOW_WWW_USER_PASSWORD=admin123
      - _PIP_ADDITIONAL_REQUIREMENTS=pyspark==3.5.0 apache-airflow-providers-apache-spark==4.5.0 apache-airflow-providers-postgres==5.9.0 psycopg2-binary==2.9.9 boto3==1.34.12
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/config:/opt/airflow/config
      - ./dbt:/opt/airflow/dbt
    ports:
      - "8085:8085"
    command: standalone
    networks: 
      - lakehouse
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8085/health"]
      interval: 30s
      timeout: 10s
      retries: 1

volumes:
  minio_data:
  postgres_data:
  nessie-data:

networks:
  lakehouse:
    driver: bridge


