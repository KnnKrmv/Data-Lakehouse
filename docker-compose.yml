services:
  # MinIO - Object Storage
  minio:
    image: minio/minio:latest
    container_name: lakehouse-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # MinIO Client - Bucket yaratmaq üçün
  minio-setup:
    image: minio/mc:latest
    container_name: lakehouse-minio-setup
    depends_on:
      - minio
    networks:
      - lakehouse
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin123;
      /usr/bin/mc mb myminio/warehouse --ignore-existing;
      /usr/bin/mc mb myminio/raw-data --ignore-existing;
      /usr/bin/mc anonymous set download myminio/warehouse;
      /usr/bin/mc anonymous set download myminio/raw-data;
      exit 0;
      "

  # Nessie - Catalog Server
  nessie:
    image: projectnessie/nessie:latest
    container_name: lakehouse-nessie
    ports:
      - "19120:19120"
    environment:
      QUARKUS_HTTP_PORT: 19120
      NESSIE_VERSION_STORE_TYPE: ROCKSDB
      QUARKUS_PROFILE: prod
    volumes:
      - nessie-data:/nessie/data
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:19120/api/v1/config || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL for Airflow & Source Data
  postgres:
    image: postgres:13
    container_name: lakehouse-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spark Master
  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: lakehouse-spark-master
    hostname: spark-master
    ports:
      - "8088:8080"
      - "7077:7077"
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
    volumes:
      - ./spark/jars:/opt/spark/jars-extra
      - spark_checkpoints:/opt/spark-checkpoints
    networks:
      - lakehouse
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master

  # Spark Worker 1
  spark-worker-1:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: lakehouse-spark-worker-1
    hostname: spark-worker-1
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=4
      - SPARK_WORKER_MEMORY=8G
      - SPARK_WORKER_WEBUI_PORT=8081
    volumes:
      - ./spark/jars:/opt/spark/jars-extra
      - spark_checkpoints:/opt/spark-checkpoints
    networks:
      - lakehouse
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077

  # Trino - Query Engine
  trino:
    image: trinodb/trino:latest
    container_name: trino
    volumes:
      - ./trino/catalog:/etc/trino/catalog
    ports:
      - "8080:8080"
    networks:
      - lakehouse
    depends_on:
      - nessie
      - minio
    mem_limit: 2g

  # Merged Airflow Container
  airflow:
    build: .
    container_name: lakehouse-airflow
    depends_on:
      - postgres
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__FERNET_KEY=UKMzEm3yIuFYEq1y3-2FxPNWSVwRASpahmQ9kQfEr8E=
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=true
      - AIRFLOW__CORE__TEST_CONNECTION=Enabled
      - AIRFLOW__WEBSERVER__WEB_SERVER_PORT=8085
      - AIRFLOW_WWW_USER_USERNAME=admin
      - AIRFLOW_WWW_USER_PASSWORD=admin123
      - _PIP_ADDITIONAL_REQUIREMENTS=pyspark==3.5.0 apache-airflow-providers-apache-spark==4.5.0 apache-airflow-providers-postgres==5.9.0 psycopg2-binary==2.9.9 boto3==1.34.12
      - DBT_PROFILES_DIR=/opt/airflow/dbt/dbt_datalakehouse
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/config:/opt/airflow/config
      - ./dbt:/opt/airflow/dbt
      - ./spark/jars:/opt/spark/jars-extra
      - ./jobs:/opt/airflow/jobs
      - spark_checkpoints:/opt/spark-checkpoints
    ports:
      - "8085:8085"
      - "4040-4050:4040-4050"
    command: standalone
    networks: 
      - lakehouse
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8085/health"]
      interval: 30s
      timeout: 10s
      retries: 1

  # Kafka
  kafka:
    container_name: lakehouse-kafka
    image: apache/kafka:3.9.0
    hostname: kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      CLUSTER_ID: '4L6g3nShT-eMCtK--X86sw'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      KAFKA_BROKER_HEARTBEAT_INTERVAL_MS: 3000
      KAFKA_BROKER_SESSION_TIMEOUT_MS: 18000
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - lakehouse

  # Kafka UI
  kafka-ui:
    container_name: lakehouse-kafka-ui
    image: provectuslabs/kafka-ui:v0.7.2
    ports:
      - "8084:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: 'true'
      KAFKA_CLUSTERS_0_NAME: 'Lakehouse Kafka'
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: 'kafka:9092'
      SERVER_PORT: 8080
    networks:
      - lakehouse
    depends_on:
      - kafka

  mongodb:
    image: mongo:7
    container_name: lakehouse-mongodb
    hostname: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongodb_data:/data/db
    networks:
      - lakehouse
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  debezium:
    image: debezium/connect:2.7.3.Final
    container_name: lakehouse-debezium
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1

      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses

      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
    depends_on:
      - kafka
      - postgres
    networks:
      - lakehouse

  dbt:
    image: lakehouse-dbt:latest
    container_name: lakehouse-dbt

    working_dir: /usr/app/dbt

    volumes:
      - ./dbt/dbt_datalakehouse:/usr/app/dbt

    environment:
      DBT_PROFILES_DIR: /usr/app/dbt

    depends_on:
      - trino

    networks:
      - lakehouse

    tty: true

volumes:
  minio_data:
  postgres_data:
  nessie-data:
  kafka_data:
  airflow_logs:
  mongodb_data:
  spark_checkpoints:
networks:
  lakehouse:
    driver: bridge
